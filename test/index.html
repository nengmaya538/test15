---
layout: none
permalink: /.index.html
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Loading...</title>
    <link rel="preconnect" href="https://www.blogger.com">
    <link rel="preconnect" href="https://blogger.googleusercontent.com">
    <link rel="dns-prefetch" href="https://www.blogger.com">
    <link rel="canonical" id="canonicalUrl" href="">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:system-ui,-apple-system,sans-serif;
            max-width:750px;
            margin:0 auto;
            padding:70px 16px 20px;
            background:#f5f5f5;
            color:#1a1a2e;
            line-height:1.6;
        }
        
        /* Header */
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 16px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);
            position:fixed;top:0;left:0;right:0;z-index:100;
        }
        .header-brand{display:flex;align-items:center;gap:10px;min-width:0}
        .header-svg{width:32px;height:32px;flex-shrink:0}
        .header-title{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .header-btn{
            display:flex;align-items:center;justify-content:center;
            width:34px;height:34px;background:none;border:none;cursor:pointer;
            border-radius:6px;color:#333
        }
        .header-btn:active{background:rgba(0,0,0,.05)}
        .header-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
        
        /* Menu */
        .menu{
            display:none;position:fixed;z-index:99;background:#fff;
            border:1px solid #e0e0e0;padding:12px;border-radius:8px;
            box-shadow:0 4px 16px rgba(0,0,0,.1)
        }
        .menu a{display:block;padding:8px 12px;color:#333;text-decoration:none;border-radius:4px;font-size:13px;font-weight:500}
        .menu a:active{background:rgba(0,0,0,.05)}
        
        /* Back button */
        .back-link{
            display:inline-flex;align-items:center;gap:4px;color:#4a90d9;
            text-decoration:none;font-size:13px;font-weight:500;margin-bottom:16px
        }
        .back-link:hover{text-decoration:underline}
        .back-link svg{width:16px;height:16px}
        
        /* Search */
        .search-wrap{display:flex;gap:6px;margin-bottom:16px}
        .search-input{
            flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;
            font-size:14px;font-family:inherit;outline:none;background:#fff
        }
        .search-input:focus{border-color:#4a90d9}
        .search-btn{
            padding:8px 16px;background:#4a90d9;color:#fff;border:none;
            border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap
        }
        .search-btn:active{background:#357abd}
        
        /* Breadcrumb */
        .breadcrumb{margin-bottom:12px;font-size:12px;color:#999}
        .breadcrumb a{color:#666;text-decoration:none}
        .breadcrumb a:hover{color:#4a90d9}
        .breadcrumb span{color:#333;font-weight:600}
        
        /* Filter & Info */
        .filter-bar{
            display:flex;align-items:center;gap:8px;padding:8px 12px;
            background:#fff;border-radius:6px;margin-bottom:12px;font-size:12px;color:#666
        }
        .filter-bar a{margin-left:auto;color:#4a90d9;text-decoration:none;font-weight:600}
        .info-msg{
            padding:8px 12px;background:#fff3cd;border:1px solid #ffc107;
            border-radius:6px;margin-bottom:12px;font-size:12px;color:#856404
        }
        
        /* Headings */
        h1{font-size:20px;margin-bottom:4px;color:#1a1a2e}
        .desc{font-size:12px;color:#999;margin-bottom:16px}
        
        /* Post Card (list view) */
        .post{
            background:#fff;padding:16px;margin-bottom:12px;border-radius:8px;
            box-shadow:0 1px 3px rgba(0,0,0,.06)
        }
        .post-img{width:100%;height:auto;border-radius:4px;margin-bottom:10px;display:block}
        .post h2{font-size:17px;margin-bottom:6px}
        .post h2 a{color:#1a1a2e;text-decoration:none}
        .post h2 a:hover{color:#4a90d9}
        .post-meta{font-size:11px;color:#999;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
        .post-label{display:inline-block;background:#f0f0f0;padding:2px 8px;border-radius:10px;font-size:10px;color:#666;text-decoration:none}
        .post-label:hover{background:#e0e0e0}
        .post-snippet{font-size:13px;color:#555;line-height:1.5}
        
        /* ============================================ */
        /* SINGLE POST VIEW */
        /* ============================================ */
        .single-post-view{
            background:#fff;padding:20px;border-radius:8px;
            box-shadow:0 1px 3px rgba(0,0,0,.06)
        }
        .single-post-view h1.post-title{
            font-size:22px;line-height:1.3;margin-bottom:12px;color:#1a1a2e
        }
        .single-post-view .post-meta{
            padding-bottom:12px;border-bottom:1px solid #eee;margin-bottom:16px
        }
        .single-post-view .post-body{
            font-size:15px;line-height:1.7;color:#333
        }
        .single-post-view .post-body img{
            max-width:100%;height:auto;border-radius:6px;margin:12px 0;display:block
        }
        .single-post-view .post-body pre{
            background:#f5f5f5;padding:12px;border-radius:6px;overflow-x:auto;font-size:13px;margin:12px 0
        }
        .single-post-view .post-body code{
            background:#f0f0f0;padding:2px 6px;border-radius:3px;font-size:13px;color:#333
        }
        .single-post-view .post-body pre code{
            background:none;padding:0;color:#333
        }
        .single-post-view .post-body blockquote{
            border-left:3px solid #4a90d9;padding:8px 12px;margin:12px 0;
            color:#666;background:#f9f9f9;border-radius:0 4px 4px 0
        }
        .single-post-view .post-body a{color:#4a90d9;text-decoration:underline}
        .single-post-view .post-body a:hover{color:#357abd}
        .single-post-view .post-body h2,.single-post-view .post-body h3,.single-post-view .post-body h4{
            margin:20px 0 10px;color:#1a1a2e
        }
        .single-post-view .post-body h2{font-size:20px}
        .single-post-view .post-body h3{font-size:18px}
        .single-post-view .post-body h4{font-size:16px}
        .single-post-view .post-body ul,.single-post-view .post-body ol{
            margin:8px 0 8px 20px
        }
        .single-post-view .post-body li{margin:4px 0}
        .single-post-view .post-body p{margin-bottom:12px}
        .single-post-view .post-body table{
            width:100%;border-collapse:collapse;margin:12px 0
        }
        .single-post-view .post-body table td,.single-post-view .post-body table th{
            border:1px solid #ddd;padding:8px;text-align:left
        }
        .single-post-view .post-body table th{background:#f5f5f5;font-weight:600}
        
        /* Related Posts */
        .related-section{margin-top:24px}
        .related-section h3{font-size:16px;margin-bottom:12px;color:#1a1a2e}
        .related-posts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
        .related-post{
            background:#fff;padding:10px;border-radius:6px;
            box-shadow:0 1px 3px rgba(0,0,0,.06);text-decoration:none;display:block
        }
        .related-post:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .related-post-img{width:100%;height:90px;object-fit:cover;border-radius:4px;margin-bottom:8px;display:block}
        .related-post-title{font-size:12px;font-weight:600;color:#1a1a2e;line-height:1.3;display:block}
        
        /* Pagination */
        .pagination{display:flex;justify-content:center;gap:6px;margin-top:20px}
        .pagination a,.pagination span{
            display:inline-flex;align-items:center;justify-content:center;
            min-width:32px;height:32px;padding:0 8px;border-radius:6px;
            font-size:13px;text-decoration:none
        }
        .pagination a{background:#f0f0f0;color:#555}
        .pagination a:active{background:#ddd}
        .pagination .current{background:#4a90d9;color:#fff;font-weight:700}
        .pagination .disabled{opacity:.3;pointer-events:none;background:#f5f5f5}
        
        /* States */
        .loading,.error,.empty{text-align:center;padding:40px 20px;color:#999;font-size:14px}
        .error{color:#c0392b}
        
        footer{margin-top:32px;padding-top:16px;border-top:1px solid #eee;text-align:center;font-size:11px;color:#999}
        
        @media(max-width:480px){
            .single-post-view{padding:14px}
            .single-post-view h1.post-title{font-size:19px}
            .single-post-view .post-body{font-size:14px}
            .related-posts{grid-template-columns:repeat(2,1fr);gap:8px}
        }
        
        /* Dark mode */
        @media(prefers-color-scheme:dark){
            body{background:#1a1a1a;color:#e0e0e0}
            .header,.menu,.post,.filter-bar,.single-post-view{background:#2d2d2d}
            .header{border-bottom:1px solid #444}
            .header-btn{color:#ccc}
            .menu{border-color:#444}
            .menu a{color:#ccc}
            .search-input{background:#2d2d2d;border-color:#444;color:#e0e0e0}
            h1,.single-post-view h1.post-title,.related-section h3{color:#e0e0e0}
            .post h2 a{color:#e0e0e0}
            .post-snippet{color:#bbb}
            .post-label{background:#3d3d3d;color:#bbb}
            .post-label:hover{background:#555}
            .pagination a{background:#333;color:#bbb}
            .breadcrumb span,.filter-bar{color:#bbb}
            .info-msg{background:#3d3520;border-color:#665500;color:#e0c860}
            
            .single-post-view .post-body{color:#ccc}
            .single-post-view .post-body pre{background:#333}
            .single-post-view .post-body code{background:#444;color:#ddd}
            .single-post-view .post-body pre code{background:none;color:#ddd}
            .single-post-view .post-body blockquote{color:#bbb;background:#333}
            .single-post-view .post-body h2,.single-post-view .post-body h3,.single-post-view .post-body h4{color:#e0e0e0}
            .single-post-view .post-body table td,.single-post-view .post-body table th{border-color:#444}
            .single-post-view .post-body table th{background:#333}
            .single-post-view .post-meta{border-bottom-color:#444}
            
            .related-post{background:#2d2d2d}
            .related-post-title{color:#e0e0e0}
            footer{border-color:#333}
        }
    </style>
    {% include head.html %}
    {% include verif.html %}
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <svg class="header-svg" viewBox="0 0 100 100" aria-hidden="true">
                <rect x="8" y="8" width="84" height="84" rx="16" fill="#4a90d9"/>
                <text id="brandSvgText" x="50" y="65" text-anchor="middle" fill="#fff" font-size="40" font-weight="700" font-family="system-ui">A</text>
            </svg>
            <span class="header-title" id="blogTitle"></span>
        </div>
        <button class="header-btn" id="menuToggle" aria-label="Menu">
            <svg id="iconMenu" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            <svg id="iconClose" viewBox="0 0 24 24" style="display:none"><path d="M6 6l12 12M6 18l12-12"/></svg>
        </button>
    </header>

    <!-- MENU -->
    <nav class="menu" id="menuPanel">
        <a href="/">Home</a>
        <a href="/contact/">Contact</a>
        <a href="/privacy-policy/">Privacy Policy</a>
        <a href="/terms-and-conditions/">Terms &amp; Conditions</a>
    </nav>

    <!-- BACK BUTTON -->
    <a class="back-link" id="backLink" style="display:none" href="/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to posts
    </a>

    <!-- BREADCRUMB -->
    <div class="breadcrumb" id="breadcrumb">
        <a href="/">Home</a>
    </div>

    <!-- SEARCH -->
    <form class="search-wrap" id="searchForm" action="/" method="get">
        <input class="search-input" type="search" name="label" placeholder="Search label..." aria-label="Search by label">
        <button class="search-btn" type="submit">Search</button>
    </form>

    <!-- MAIN -->
    <h1 id="pageHeading">Loading...</h1>
    <p class="desc" id="siteDesc"></p>
    <div class="filter-bar" id="filterBar" style="display:none"></div>
    <div id="mainContent"><p class="loading">Loading posts...</p></div>
    <div class="pagination" id="pagination"></div>

    <footer>{% include footer.html %}</footer>

    <script>
    (function(){
        const $ = id => document.getElementById(id);
        
        // Domain info
        const host = location.hostname;
        const parts = host.split('.');
        let displayName = parts[0];
        if(parts.length>2&&parts[0]==='www') displayName = parts[1];
        displayName = displayName.replace(/[\.-]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        
        const letters = displayName.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().substring(0,3)||'B';
        $('brandSvgText').textContent = letters;
        $('blogTitle').textContent = displayName;
        
        // Menu toggle
        const menu = $('menuPanel');
        const iconM = $('iconMenu');
        const iconC = $('iconClose');
        let menuOpen = false;
        
        $('menuToggle').onclick = function(e){
            e.stopPropagation();
            menuOpen = !menuOpen;
            menu.style.display = menuOpen?'block':'none';
            iconM.style.display = menuOpen?'none':'';
            iconC.style.display = menuOpen?'':'none';
            if(menuOpen){
                const r = this.getBoundingClientRect();
                menu.style.top = (r.bottom+4)+'px';
                menu.style.right = (innerWidth-r.right)+'px';
            }
        };
        
        document.onclick = function(e){
            if(menuOpen && !menu.contains(e.target)){
                menuOpen=false;menu.style.display='none';
                iconM.style.display='';iconC.style.display='none';
            }
        };
        
        // URL params
        const p = new URLSearchParams(location.search);
        const LABEL = p.get('label')||'';
        const POST_SLUG = p.get('p')||'';
        const MAX = parseInt(p.get('max-results'))||15;
        const START = parseInt(p.get('start-index'))||1;
        const BID = p.get('blogid')||'3849070220815751744';
        
        $('canonicalUrl').href = location.href;
        
        // Helpers
        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function hd(u){return u&&u.includes('googleusercontent.com')?u.replace(/\/s\d+(-c)?\//,'/s1600/'):u}
        function strip(h){if(!h)return'';const d=document.createElement('div');d.innerHTML=h;return(d.textContent||'').replace(/\s+/g,' ').trim()}
        function fd(d){try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}catch(e){return d}}
        
        const base = host.includes('blogspot.com')?
            'https://'+host+'/feeds/posts/default':
            'https://www.blogger.com/feeds/'+BID+'/posts/default';
        
        // ============================================
        // SINGLE POST MODE
        // ============================================
        if(POST_SLUG){
            $('searchForm').style.display = 'none';
            $('backLink').style.display = 'inline-flex';
            if(document.referrer && document.referrer.includes(host)){
                $('backLink').href = document.referrer;
            }
            $('pagination').style.display = 'none';
            
            // Ambil beberapa postingan terbaru untuk mencari slug yang cocok
            const feedUrl = base+'?alt=json-in-script&callback=sp&max-results=50';
            
            window.sp = function(data){
                const feed = data.feed;
                const container = $('mainContent');
                
                if(!feed||!feed.entry){
                    container.innerHTML = '<p class="error">Post not found.</p>';
                    return;
                }
                
                const entries = Array.isArray(feed.entry)?feed.entry:[feed.entry];
                
                // Cari postingan dengan slug yang cocok
                const post = entries.find(e=>{
                    const link = (e.link||[]).find(l=>l.rel==='alternate')?.href||'';
                    const slug = link.split('/').pop().replace('.html','');
                    return slug === POST_SLUG;
                });
                
                if(!post){
                    container.innerHTML = '<p class="error">Post not found. <a href="/">Back to home</a></p>';
                    return;
                }
                
                renderSinglePost(post, entries);
            };
            
            function renderSinglePost(post, allEntries){
                const container = $('mainContent');
                const title = post.title?.$t||'Untitled';
                const date = fd(post.published?.$t);
                const content = post.content?.$t||post.summary?.$t||'';
                const cats = (post.category||[]).map(c=>c.term).filter(Boolean);
                const author = post.author?.[0]?.name?.$t||'';
                
                // IDENTITAS HALAMAN = JUDUL POST
                document.title = title + ' — ' + displayName;
                $('pageHeading').textContent = title;
                $('siteDesc').textContent = strip(content).substring(0,160);
                
                const md = document.querySelector('meta[name="description"]')||document.createElement('meta');
                md.name = 'description';
                md.content = strip(content).substring(0,160);
                if(!md.parentNode) document.head.appendChild(md);
                
                // Breadcrumb
                let breadHtml = '<a href="/">Home</a>';
                if(cats.length){
                    breadHtml += ' &rsaquo; ' + cats.map(c=>
                        '<a href="/?label='+encodeURIComponent(c)+'">'+esc(c)+'</a>'
                    ).join(', ');
                }
                breadHtml += ' &rsaquo; <span>'+esc(title)+'</span>';
                $('breadcrumb').innerHTML = breadHtml;
                
                // Render single post
                let html = '<article class="single-post-view">';
                html += '<h1 class="post-title">'+esc(title)+'</h1>';
                html += '<div class="post-meta">';
                if(author) html += '<span>By '+esc(author)+'</span>';
                if(date) html += '<time datetime="'+(post.published?.$t||'')+'">'+date+'</time>';
                if(cats.length) html += cats.map(c=>
                    '<a href="/?label='+encodeURIComponent(c)+'" class="post-label">#'+esc(c)+'</a>'
                ).join('');
                html += '</div>';
                html += '<div class="post-body">'+content+'</div>';
                html += '</article>';
                
                // Related posts
                const relatedPosts = allEntries.filter(e=>{
                    const link = (e.link||[]).find(l=>l.rel==='alternate')?.href||'';
                    const slug = link.split('/').pop().replace('.html','');
                    if(slug === POST_SLUG) return false;
                    const eCats = (e.category||[]).map(c=>c.term.toLowerCase());
                    return cats.some(c=>eCats.includes(c.toLowerCase()));
                }).slice(0,4);
                
                if(relatedPosts.length){
                    html += '<div class="related-section"><h3>Related Posts</h3><div class="related-posts">';
                    relatedPosts.forEach(e=>{
                        const t = e.title?.$t||'Untitled';
                        const link = (e.link||[]).find(l=>l.rel==='alternate')?.href||'#';
                        const slug = link.split('/').pop().replace('.html','');
                        const thumb = hd(e.media$thumbnail?.url);
                        const relUrl = '/?p='+slug+(BID!=='3849070220815751744'?'&blogid='+BID:'');
                        
                        html += '<a href="'+relUrl+'" class="related-post">';
                        if(thumb) html += '<img class="related-post-img" src="'+thumb+'" alt="'+esc(t)+'" loading="lazy" onerror="this.style.display=\'none\'">';
                        html += '<span class="related-post-title">'+esc(t)+'</span></a>';
                    });
                    html += '</div></div>';
                }
                
                container.innerHTML = html;
                $('pagination').innerHTML = '';
            }
            
            const s = document.createElement('script');
            s.src = feedUrl;
            s.async = true;
            s.onerror = ()=>$('mainContent').innerHTML='<p class="error">Failed to load post.</p>';
            document.head.appendChild(s);
            return;
        }
        
        // ============================================
        // LIST MODE
        // ============================================
        
        const si = document.querySelector('.search-input');
        if(si && LABEL) si.value = LABEL;
        
        if(LABEL){
            const pageTitle = LABEL + ' — ' + displayName;
            const pageDesc = 'Posts and articles about ' + LABEL + ' on ' + displayName + '.';
            
            document.title = pageTitle;
            $('pageHeading').textContent = LABEL;
            $('siteDesc').textContent = pageDesc;
            
            const md = document.createElement('meta');
            md.name = 'description';
            md.content = pageDesc;
            document.head.appendChild(md);
            
            $('filterBar').style.display = 'flex';
            $('filterBar').innerHTML = 'Browsing: <strong>'+esc(LABEL)+'</strong> <a href="/">Clear</a>';
            $('breadcrumb').innerHTML = '<a href="/">Home</a> &rsaquo; <span>'+esc(LABEL)+'</span>';
        } else {
            document.title = displayName + ' — Blog';
            $('pageHeading').textContent = displayName;
            $('siteDesc').textContent = 'Collection of articles and notes.';
            
            const md = document.createElement('meta');
            md.name = 'description';
            md.content = 'Collection of articles and notes from ' + displayName + '.';
            document.head.appendChild(md);
        }
        
        function il(u){
            if(!u)return'#';
            try{
                const ur=new URL(u);
                const slug = ur.pathname.split('/').pop().replace('.html','');
                const pp = new URLSearchParams();
                if(BID!=='3849070220815751744') pp.set('blogid',BID);
                pp.set('p',slug);
                return '/?'+pp.toString();
            }catch(e){}
            return u;
        }
        
        function buildUrl(useLabel){
            const fp = new URLSearchParams();
            fp.set('alt','json-in-script');
            fp.set('callback','hp');
            fp.set('max-results',MAX);
            fp.set('start-index',START);
            if(useLabel) fp.set('category',useLabel);
            return base+'?'+fp.toString();
        }
        
        let feedUrl = buildUrl(LABEL);
        let labelMatched = false;
        
        window.hp = function(data){
            const feed = data.feed;
            const container = $('mainContent');
            
            if(LABEL && !labelMatched && (!feed||!feed.entry)){
                labelMatched = true;
                feedUrl = buildUrl('');
                const s = document.createElement('script');
                s.src = feedUrl;
                s.async = true;
                document.head.appendChild(s);
                return;
            }
            
            if(!feed||!feed.entry){
                container.innerHTML = '<p class="empty">No posts found.</p>';
                return;
            }
            
            if(LABEL && !labelMatched && feed.entry){
                const entries = Array.isArray(feed.entry)?feed.entry:[feed.entry];
                const hasMatchingLabel = entries.some(e=>{
                    const cats = (e.category||[]).map(c=>c.term.toLowerCase());
                    return cats.includes(LABEL.toLowerCase());
                });
                
                if(!hasMatchingLabel){
                    labelMatched = true;
                    
                    const infoBar = document.createElement('div');
                    infoBar.className = 'info-msg';
                    infoBar.innerHTML = 'No posts tagged "<strong>'+esc(LABEL)+'</strong>". Showing latest posts instead.';
                    container.parentNode.insertBefore(infoBar, container);
                    
                    $('filterBar').style.display = 'none';
                    $('breadcrumb').innerHTML = '<a href="/">Home</a> &rsaquo; <span>'+esc(LABEL)+'</span> &rsaquo; <span>Latest Posts</span>';
                }
            }
            
            const entries = Array.isArray(feed.entry)?feed.entry:[feed.entry];
            const total = parseInt(feed.openSearch$totalResults?.$t)||entries.length;
            
            let html = '<p style="font-size:12px;color:#999;margin-bottom:12px">Showing '+
                START+'-'+(START+entries.length-1)+' of '+total+' posts</p>';
            
            for(let i=0;i<entries.length;i++){
                const e = entries[i];
                const t = e.title?.$t||'Untitled';
                const link = il((e.link||[]).find(l=>l.rel==='alternate')?.href||'#');
                const date = fd(e.published?.$t);
                const content = e.content?.$t||e.summary?.$t||'';
                const thumb = hd(e.media$thumbnail?.url)||(function(c){
                    if(!c)return null;const d=document.createElement('div');d.innerHTML=c;
                    const i=d.querySelector('img');return i?hd(i.src):null;
                })(content);
                const cats = (e.category||[]).map(c=>c.term).filter(Boolean);
                const snippet = strip(content).substring(0,150)+'...';
                
                html += '<article class="post">';
                if(thumb) html += '<a href="'+link+'"><img class="post-img" src="'+thumb+
                    '" alt="'+esc(t)+'" loading="lazy" onerror="this.parentElement.remove()"></a>';
                html += '<h2><a href="'+link+'">'+esc(t)+'</a></h2>';
                html += '<div class="post-meta">';
                if(date) html += '<time datetime="'+(e.published?.$t||'')+'">'+date+'</time>';
                if(cats.length) html += cats.map(c=>
                    '<a href="/?label='+encodeURIComponent(c)+'" class="post-label">#'+esc(c)+'</a>'
                ).join('');
                html += '</div><p class="post-snippet">'+esc(snippet)+'</p></article>';
            }
            
            container.innerHTML = html;
            
            const pages = Math.ceil(total/MAX);
            const cur = Math.floor((START-1)/MAX)+1;
            const pg = $('pagination');
            
            if(pages<2){pg.innerHTML='';return}
            
            function bu(page){
                const pp=new URLSearchParams();
                if(BID!=='3849070220815751744')pp.set('blogid',BID);
                if(LABEL && !labelMatched)pp.set('label',LABEL);
                if(MAX!==15)pp.set('max-results',MAX);
                if(page>1)pp.set('start-index',(page-1)*MAX+1);
                const q=pp.toString();return q?'/?'+q:'/';
            }
            
            let ph = '';
            if(cur>1) ph += '<a href="'+bu(cur-1)+'">&lsaquo;</a>';
            else ph += '<span class="disabled">&lsaquo;</span>';
            
            const sp = Math.max(1,cur-2);
            const ep = Math.min(pages,cur+2);
            for(let i=sp;i<=ep;i++){
                if(i===cur) ph += '<span class="current">'+i+'</span>';
                else ph += '<a href="'+bu(i)+'">'+i+'</a>';
            }
            
            if(cur<pages) ph += '<a href="'+bu(cur+1)+'">&rsaquo;</a>';
            else ph += '<span class="disabled">&rsaquo;</span>';
            
            pg.innerHTML = ph;
        };
        
        const s = document.createElement('script');
        s.src = feedUrl;
        s.async = true;
        s.onerror = ()=>$('mainContent').innerHTML='<p class="error">Failed to load.</p>';
        document.head.appendChild(s);
    })();
    </script>
</body>
</html>
